<vex-page-layout>

  <!-- HEADER -->
  <vex-page-layout-header class="pb-8">

    <div
      [class.container]="layoutCtrl.value === 'boxed'"
      [class.px-6]="layoutCtrl.value === 'fullwidth'"
      class="w-full flex flex-col sm:flex-row justify-between sm:items-center gap-4">

      <!-- TITLE -->
      <div>
        <h1 class="title mt-0 mb-1">Gestion des Séances</h1>
        <vex-breadcrumbs
          [crumbs]="['Configuration', 'Gestion des Séances']">
        </vex-breadcrumbs>
      </div>

      <!-- LAYOUT TOGGLE -->
      <mat-button-toggle-group
        [formControl]="layoutCtrl"
        class="self-start sm:self-auto">

        <mat-button-toggle value="boxed">
          Réduit
        </mat-button-toggle>

        <mat-button-toggle value="fullwidth">
          Plein écran
        </mat-button-toggle>

      </mat-button-toggle-group>

    </div>

  </vex-page-layout-header>

  <!-- CONTENT -->
  <vex-page-layout-content
    [class.container]="layoutCtrl.value === 'boxed'"
    class="-mt-6 pb-8">

    <div class="card overflow-hidden shadow-sm rounded-xl">

      <!-- TOOLBAR -->
      <div
        class="bg-app-bar px-6 py-3 border-b flex items-center gap-4 flex-wrap">

        <h2 class="title my-0 flex-none">
          Séances
        </h2>

        <!-- SEARCH -->
        <mat-form-field appearance="outline" class="w-72">
          <mat-icon matPrefix svgIcon="mat:search"></mat-icon>
          <input
            matInput
            [formControl]="searchCtrl"
            placeholder="Rechercher une séance..." />
        </mat-form-field>

        <span class="flex-1"></span>

      </div>

      <!-- TABLE -->
      <div class="overflow-auto">

        <table
          mat-table
          [dataSource]="dataSource"
          matSort
          class="w-full">

          <!-- DATE -->
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>
              Date
            </th>
            <td mat-cell *matCellDef="let row">
              <div class="flex items-center gap-2">
                <mat-icon class="text-slate-400" svgIcon="mat:calendar_today"></mat-icon>
                {{ row.date | date:'dd MMM yyyy' }}
              </div>
            </td>
          </ng-container>

          <!-- MATIERE -->
          <ng-container matColumnDef="matiere">
            <th mat-header-cell *matHeaderCellDef>
              Matière
            </th>
            <td mat-cell *matCellDef="let row">
              <span class="px-2 py-1 rounded-md bg-indigo-50 text-indigo-600 text-sm font-medium">
                {{ row.matiere }}
              </span>
            </td>
          </ng-container>

          <!-- DEBUT -->
          <ng-container matColumnDef="heureDebut">
            <th mat-header-cell *matHeaderCellDef class="text-center">
              Début
            </th>
            <td mat-cell *matCellDef="let row" class="text-center font-mono">
              {{ row.heureDebut }}
            </td>
          </ng-container>

          <!-- FIN -->
          <ng-container matColumnDef="heureFin">
            <th mat-header-cell *matHeaderCellDef class="text-center">
              Fin
            </th>
            <td mat-cell *matCellDef="let row" class="text-center font-mono">
              {{ row.heureFin }}
            </td>
          </ng-container>

          <!-- STATUT -->
          <ng-container matColumnDef="statut">
            <th mat-header-cell *matHeaderCellDef class="text-right">
              Statut
            </th>
            <td mat-cell *matCellDef="let row" class="text-right">
              <span
                class="px-2 py-1 rounded-full text-xs font-semibold"
                [ngClass]="{
                  'bg-green-100 text-green-700': row.statut === 'Terminé',
                  'bg-yellow-100 text-yellow-700': row.statut !== 'Terminé'
                }">
                {{ row.statut }}
              </span>
            </td>
          </ng-container>

          <!-- HEADER ROW -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"
              class="bg-slate-50 text-slate-600"></tr>

          <!-- ROW -->
          <tr mat-row *matRowDef="let row; columns: displayedColumns"
              class="hover:bg-indigo-50/40 transition cursor-pointer"></tr>

        </table>

      </div>

      <!-- PAGINATOR -->
      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        class="border-t">
      </mat-paginator>

    </div>

  </vex-page-layout-content>

</vex-page-layout>
