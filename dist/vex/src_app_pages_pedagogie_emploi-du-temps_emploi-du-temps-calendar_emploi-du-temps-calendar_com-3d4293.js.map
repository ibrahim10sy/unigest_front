<vex-page-layout>

  <!-- HEADER -->
  <vex-page-layout-header class="pb-16 flex flex-col items-start justify-center">
    <div class="w-full flex flex-col sm:flex-row justify-between">

      <div>
        <h1 class="title mt-0 mb-1">Emploi du Temps</h1>
        <vex-breadcrumbs [crumbs]="['Scolarité', 'Emploi du Temps']"></vex-breadcrumbs>
      </div>

      <div class="flex items-center gap-3 mt-4 sm:mt-0">

        <!-- Sélecteur de classe -->
        <mat-form-field appearance="outline" class="flex-none">
          <mat-label>Classe</mat-label>
          <mat-select [(value)]="classeId" (selectionChange)="onClasseChange()">
            <mat-option *ngFor="let c of classes" [value]="c.id">
              {{ c.nom }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="ajouter()">
          <mat-icon svgIcon="mat:add"></mat-icon>
          Ajouter
        </button>

        <button mat-raised-button color="accent" (click)="exporterPdf()">
          <mat-icon>picture_as_pdf</mat-icon>
          PDF
        </button>

      </div>
    </div>
  </vex-page-layout-header>

  <!-- CONTENT -->
  <vex-page-layout-content class="-mt-6">
    <div class="card overflow-hidden -mt-16 h-full flex flex-col">

      <!-- Barre de navigation du calendrier -->
      <div class="calendar-toolbar flex items-center justify-between px-4 py-3 border-b">

        <!-- Navigation précédent / aujourd'hui / suivant -->
        <div class="flex items-center gap-1">
          <button mat-icon-button
                  mwlCalendarPreviousView
                  [view]="view"
                  [(viewDate)]="viewDate">
            <mat-icon svgIcon="mat:chevron_left"></mat-icon>
          </button>

          <button mat-button
                  mwlCalendarToday
                  [(viewDate)]="viewDate">
            Aujourd'hui
          </button>

          <button mat-icon-button
                  mwlCalendarNextView
                  [view]="view"
                  [(viewDate)]="viewDate">
            <mat-icon svgIcon="mat:chevron_right"></mat-icon>
          </button>

          <span class="ml-3 font-medium text-base">
            {{ viewDate | calendarDate: view + 'ViewTitle' : 'fr' }}
          </span>
        </div>

        <!-- Switcher Mois / Semaine / Jour -->
        <div class="flex gap-1">
          <button mat-button
                  [class.mdc-button--unelevated]="view === CalendarView.Month"
                  (click)="view = CalendarView.Month">
            Mois
          </button>
          <button mat-button
                  [class.mdc-button--unelevated]="view === CalendarView.Week"
                  (click)="view = CalendarView.Week">
            Semaine
          </button>
          <button mat-button
                  [class.mdc-button--unelevated]="view === CalendarView.Day"
                  (click)="view = CalendarView.Day">
            Jour
          </button>
        </div>

      </div>

      <!-- Vues calendrier -->
      <vex-scrollbar [ngSwitch]="view" class="flex-auto">

        <mwl-calendar-month-view
          *ngSwitchCase="'month'"
          [viewDate]="viewDate"
          [events]="events"
          [refresh]="refresh"
          [activeDayIsOpen]="activeDayIsOpen"
          (dayClicked)="dayClicked($event.day)"
          (eventClicked)="handleEvent('Clicked', $event.event)"
          (eventTimesChanged)="eventTimesChanged($event)">
        </mwl-calendar-month-view>

        <mwl-calendar-week-view
          *ngSwitchCase="'week'"
          [viewDate]="viewDate"
          [events]="events"
          [refresh]="refresh"
          (eventClicked)="handleEvent('Clicked', $event.event)"
          (eventTimesChanged)="eventTimesChanged($event)">
        </mwl-calendar-week-view>

        <mwl-calendar-day-view
          *ngSwitchCase="'day'"
          [viewDate]="viewDate"
          [events]="events"
          [refresh]="refresh"
          (eventClicked)="handleEvent('Clicked', $event.event)"
          (eventTimesChanged)="eventTimesChanged($event)">
        </mwl-calendar-day-view>

      </vex-scrollbar>

    </div>
  </vex-page-layout-content>

</vex-page-layout>
