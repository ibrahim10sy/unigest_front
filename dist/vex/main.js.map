<div class="card p-6 space-y-4">
  <!-- HEADER -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-xl font-bold">Appel des étudiants</h2>
      <p class="text-sm text-gray-500">
        Séance : {{ seance.matiere }} - {{ seance.date | date: "dd/MM/yyyy" }}
      </p>
    </div>

    <button mat-raised-button color="primary" (click)="chargerAppels()">
      Actualiser
    </button>
  </div>

  <mat-divider></mat-divider>

  <!-- LISTE ETUDIANTS -->
  <div class="space-y-3">
    <div
      *ngFor="let etu of etudiants"
      class="flex justify-between p-4 border rounded-xl"
      [ngClass]="{
        'bg-green-50': statutsMap.get(etu.id!) === StatutPresence.PRESENT,
        'bg-red-50': statutsMap.get(etu.id!) === StatutPresence.ABSENT,
        'bg-amber-50': statutsMap.get(etu.id!) === StatutPresence.RETARD
      }">
      <!-- INFO ETUDIANT -->
      <div>
        <div class="font-semibold text-gray-800">
          {{ etu.prenom }} {{ etu.nom }}
        </div>

        <div class="text-xs text-gray-500">
          {{ etu.telephone }}
        </div>

        <!-- STATUT -->
        <div
          class="mt-1 text-xs font-bold"
          [ngClass]="{
            'text-green-600':
              statutsMap.get(etu.id!) === StatutPresence.PRESENT,
            'text-red-600': statutsMap.get(etu.id!) === StatutPresence.ABSENT,
            'text-amber-600': statutsMap.get(etu.id!) === StatutPresence.RETARD
          }">
          {{ statutsMap.get(etu.id!) || "NON MARQUÉ" }}
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="flex gap-2">
        <!-- PRESENT -->
        <button
          mat-stroked-button
          color="primary"
          (click)="marquer(etu, StatutPresence.PRESENT)">
          Présent
        </button>

        <!-- ABSENT -->
        <button
          mat-stroked-button
          color="warn"
          (click)="marquer(etu, StatutPresence.ABSENT)">
          Absent
        </button>

        <!-- RETARD -->
        <button
          mat-stroked-button
          color="accent"
          (click)="marquerRetard(etu, 10)">
          Retard
        </button>
      </div>
    </div>
  </div>
</div>
