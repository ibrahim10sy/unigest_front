<form [formGroup]="form" (ngSubmit)="save()">
  <h2 mat-dialog-title>{{ mode === 'update' ? 'Modifier' : 'Nouvel' }} Matière</h2>

  <mat-dialog-content class="flex flex-col gap-4">
    
    <mat-form-field class="w-full">
      <mat-label>Matière</mat-label>
      <mat-select formControlName="matiere" [compareWith]="compareMatiere">
        <mat-option *ngFor="let p of matieres" [value]="p">
          {{ p.nom }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="w-full">
      <mat-label>Coèfficient de la matière</mat-label>
      <input matInput type="number" formControlName="coefficient">
    </mat-form-field> 
    
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Annuler</button>
    <button mat-flat-button color="primary" [disabled]="form.invalid">Enregistrer</button>
  </mat-dialog-actions>
</form>
