<div class="p-2">
  <h2 mat-dialog-title class="text-2xl font-bold flex items-center gap-2">
    <mat-icon color="primary">play_circle</mat-icon>
    Démarrer une séance
  </h2>

  <mat-dialog-content class="py-6">
    <p class="text-gray-500 mb-4">
      Veuillez sélectionner la matière pour débuter cette nouvelle session de cours.
    </p>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Matière</mat-label>

      <mat-select [formControl]="matiereCtrl">
        <mat-option *ngFor="let m of data.matieres" [value]="m.nom">
          {{ m.nom }}
        </mat-option>
      </mat-select>

      <mat-icon matSuffix>book</mat-icon>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="px-6 pb-6 gap-2">
    <button mat-button (click)="close()">
      Annuler
    </button>

    <button
      mat-flat-button
      color="primary"
      (click)="demarrer()"
      [disabled]="!matiereCtrl.value">
      Confirmer
    </button>
  </mat-dialog-actions>
</div>
