<form [formGroup]="form" (ngSubmit)="save()">
  <h2 mat-dialog-title>{{ mode === 'update' ? 'Modifier' : 'Nouvel' }} Affectations</h2>

  <mat-dialog-content class="flex flex-col gap-4">
   
    <mat-form-field class="w-full">
      <mat-label>Enseignant</mat-label>
      <mat-select formControlName="enseignant" [compareWith]="compareEnseignant">
        <mat-option *ngFor="let p of enseignant" [value]="p">
          {{ p.prenom }} {{ p.nom }} - {{ p.specialite }} - ({{ p.telephone }})
        </mat-option>
      </mat-select>
    </mat-form-field>
   <mat-form-field class="w-full">
  <mat-label>Matières</mat-label>
  <mat-select formControlName="matieres" multiple [compareWith]="compareMatiere">
    <mat-option *ngFor="let m of matiere" [value]="m">
      {{ m.nom }}
    </mat-option>
  </mat-select>
</mat-form-field>
    <mat-form-field class="w-full">
      <mat-label>Classe</mat-label>
      <mat-select formControlName="classe" [compareWith]="compareClasse">
        <mat-option *ngFor="let p of classe" [value]="p">
        {{ p.nom }} -  ({{ p.filiere.nom }})
        </mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Annuler</button>
    <button mat-flat-button color="primary" [disabled]="form.invalid">Enregistrer</button>
  </mat-dialog-actions>
</form>
