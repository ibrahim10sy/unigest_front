<vex-secondary-toolbar current="Tableau de board">
  <vex-breadcrumbs
    [crumbs]="['Dashboards', 'Analytics']"
    class="flex-auto"></vex-breadcrumbs>

  <!-- <button class="ml-2" color="primary" mat-icon-button type="button">
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button> -->
</vex-secondary-toolbar>

<div class="container p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
 

  <vex-widget-large-goal-chart
    [series]="salesSeries"
    class="sm:col-span-full"
    total="4,374"></vex-widget-large-goal-chart>

  <vex-widget-quick-value-center
    [change]="124.4"
    icon="mat:group"
    iconClass="text-primary-600 bg-primary-600/10"
    label="Etudiants"
    value="4,374"></vex-widget-quick-value-center>
  <vex-widget-quick-value-center
    [change]="-23.7"
    icon="mat:pageview"
    iconClass="text-orange-600 bg-orange-600/10"
    label="Filieres"
    value="30"></vex-widget-quick-value-center>
  <vex-widget-quick-value-center
    [change]="23.2"
    icon="mat:cloud_off"
    iconClass="text-orange-600 bg-orange-600/10"
    label="Classes"
    value="20"></vex-widget-quick-value-center>
  <vex-widget-quick-value-center
    [change]="34.5"
    icon="mat:timer"
    iconClass="text-teal-600 bg-teal/10"
    label="Session Duration"
    value="16m 48s"></vex-widget-quick-value-center>

  <vex-widget-large-chart
    [series]="userSessionsSeries"
    class="sm:col-span-2"></vex-widget-large-chart>

  <vex-widget-table
    [columns]="tableColumns"
    [data]="tableData"
    class="sm:col-span-2"></vex-widget-table>
</div>
