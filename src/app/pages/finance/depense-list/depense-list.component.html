<vex-page-layout>
  <vex-page-layout-header
    class="pb-16 flex flex-col items-start justify-center">
    <div
      [class.container]="layoutCtrl.value === 'boxed'"
      [class.px-6]="layoutCtrl.value === 'fullwidth'"
      class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <h1 class="title mt-0 mb-1">Gestion des dépenses</h1>
        <vex-breadcrumbs
          [crumbs]="['Configuration', 'Dépenses']"></vex-breadcrumbs>
      </div>

      <div class="hidden sm:block">
        <mat-button-toggle-group
          [formControl]="layoutCtrl"
          class="mt-4 sm:mt-0">
          <mat-button-toggle value="boxed">Réduire</mat-button-toggle>
          <mat-button-toggle value="fullwidth">Plein écran</mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
  </vex-page-layout-header>
  <vex-page-layout-content
    [class.container]="layoutCtrl.value === 'boxed'"
    class="-mt-6">
    <div class="card overflow-auto -mt-16">
      <div
        class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center">
        <h2 class="title my-0 hidden sm:block flex-none">Catégories</h2>

        <mat-form-field subscriptSizing="dynamic" class="ml-4">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input
            matInput
            [formControl]="searchCtrl"
            placeholder="Rechercher une catégorie..."
            type="text" />
        </mat-form-field>

        <span class="flex-1"></span>

        <button
          (click)="ouvrirForm()"
          class="ml-4 flex-none"
          color="primary"
          mat-mini-fab
          matTooltip="Ajouter une catégorie">
          <mat-icon svgIcon="mat:add"></mat-icon>
        </button>
      </div>

      <table
        @stagger
        [dataSource]="dataSource"
        class="w-full"
        mat-table
        matSort>
        <ng-container matColumnDef="dateDepense">
          <th *matHeaderCellDef mat-sort-header>Date</th>
          <td *matCellDef="let row" mat-cell>
            {{ row.dateDepense | date: "dd/MM/yyyy" }}
          </td>
        </ng-container>

        <ng-container matColumnDef="libelle">
          <th
            *matHeaderCellDef
            mat-header-cell
            mat-sort-header
            class="uppercase">
            Libellé
          </th>
          <td *matCellDef="let row" mat-cell class="font-medium text-primary">
            {{ row.libelle }}
          </td>
        </ng-container>

        <ng-container matColumnDef="montant">
          <th *matHeaderCellDef mat-sort-header>Montant</th>
          <td *matCellDef="let row" mat-cell class="font-bold">
            {{ row.montant | number: "1.0-0" }} F
          </td>
          <!-- <td *matCellDef="let row" mat-cell class="font-bold"> {{row.montant | currency:'XOF':'symbol'}} </td> -->
        </ng-container>
        <ng-container matColumnDef="categorie">
          <th *matHeaderCellDef mat-sort-header>Catégorie</th>
          <td *matCellDef="let row" mat-cell>
            {{ row.categorieDepense?.nom }}
          </td>
        </ng-container>
        <ng-container matColumnDef="anneeScolaire">
          <th *matHeaderCellDef mat-sort-header>Année Scolaire</th>
          <td *matCellDef="let row" mat-cell>
            {{ row.anneeScolaire?.libelle }}
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th *matHeaderCellDef mat-header-cell></th>
          <td *matCellDef="let row" class="w-10 text-secondary" mat-cell>
            <div class="flex">
              <button
                (click)="$event.stopPropagation(); ouvrirForm(row)"
                mat-icon-button
                color="primary">
                <mat-icon svgIcon="mat:edit"></mat-icon>
              </button>
              <button
                (click)="$event.stopPropagation(); supprimer(row)"
                mat-icon-button
                color="warn">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
        <tr
          *matRowDef="let row; columns: displayedColumns"
          @fadeInUp
          class="hover:bg-hover cursor-pointer"
          mat-row></tr>
      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>
</vex-page-layout>
