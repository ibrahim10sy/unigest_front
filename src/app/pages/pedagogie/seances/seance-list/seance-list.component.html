<vex-page-layout>
  <vex-page-layout-header
    class="pb-16 flex flex-col items-start justify-center">
    <div
      [class.container]="layoutCtrl.value === 'boxed'"
      [class.px-6]="layoutCtrl.value === 'fullwidth'"
      class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <h1 class="title mt-0 mb-1">Gestion des Séances</h1>
        <vex-breadcrumbs
          [crumbs]="['Configuration', 'Gestion des Séances']"></vex-breadcrumbs>
      </div>

      <div class="hidden sm:block">
        <mat-button-toggle-group
          [formControl]="layoutCtrl"
          class="mt-4 sm:mt-0">
          <mat-button-toggle value="boxed">Réduire</mat-button-toggle>
          <mat-button-toggle value="fullwidth">Plein écran</mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
 
</vex-page-layout-header>
  <vex-page-layout-content [class.container]="layoutCtrl.value === 'boxed'" class="-mt-6">
    <div class="card overflow-auto -mt-16">
      
      <div class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center">
        <h2 class="title my-0 hidden sm:block flex-none">Séances</h2>

        <mat-form-field subscriptSizing="dynamic" class="ml-4">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input matInput [formControl]="searchCtrl" placeholder="Rechercher..." type="text" />
        </mat-form-field>

        <span class="flex-1"></span>

        <!-- <button (click)="ajouter()" class="ml-4 flex-none" color="primary" mat-mini-fab matTooltip="Ajouter un niveau">
          <mat-icon svgIcon="mat:add"></mat-icon>
        </button> -->
      </div>

      <table
        @stagger
        [dataSource]="dataSource"
        class="w-full"
        mat-table
        matSort>
        
        <ng-container matColumnDef="date">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase text-[11px] font-extrabold text-slate-400 py-6 px-10 tracking-widest">
            Date
          </th>
          <td *matCellDef="let row" mat-cell class="py-6 px-10 font-bold text-slate-700">
            <div class="flex items-center gap-2">
              <mat-icon svgIcon="mat:calendar_today" class="text-slate-300 scale-75"></mat-icon>
              {{ row.date | date: "dd MMM yyyy" }}
            </div>
          </td>
        </ng-container>
       
        <ng-container matColumnDef="matiere">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase text-[11px] font-extrabold text-slate-400 py-6 px-10 tracking-widest">
            Matière
          </th>
          <td *matCellDef="let row" mat-cell class="py-6 px-10">
            <span class="font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-md text-sm">
              {{ row.matiere }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="heureDebut">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase text-[11px] font-extrabold text-slate-400 py-6 px-6 tracking-widest text-center">
            Début
          </th>
          <td *matCellDef="let row" mat-cell class="py-6 px-6 font-mono text-center font-bold text-slate-600">
            {{ row.heureDebut }}
          </td>
        </ng-container>

        <ng-container matColumnDef="heureFin">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase text-[11px] font-extrabold text-slate-400 py-6 px-6 tracking-widest ">
            Fin
          </th>
          <td *matCellDef="let row" mat-cell class="py-6 px-6 font-mono text-center font-bold text-slate-600">
            {{ row.heureFin }}
          </td>
        </ng-container>

        <ng-container matColumnDef="statut">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase text-[11px] font-extrabold text-slate-400 py-6 px-10 tracking-widest">
            Statut
          </th>
          <td *matCellDef="let row" mat-cell class="py-6 px-10 text-right">
            <span
              class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter shadow-sm border"
              [ngClass]="
                row.statut === 'Terminé'
                  ? 'bg-emerald-50 text-emerald-600 border-emerald-100'
                  : 'bg-amber-50 text-amber-600 border-amber-100'
              ">
              {{ row.statut }}
            </span>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="displayedColumns" mat-header-row class="bg-slate-50/80"></tr>
        <tr *matRowDef="let row; columns: displayedColumns" @fadeInUp class="hover:bg-indigo-50/30 transition-all cursor-pointer" mat-row></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 20]" class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>
</vex-page-layout>
