<vex-page-layout>
  <!-- HEADER -->
  <vex-page-layout-header class="pb-6 flex flex-col items-start justify-center">
    <div
      [class.container]="layoutCtrl.value === 'boxed'"
      [class.px-6]="layoutCtrl.value === 'fullwidth'"
      class="w-full flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">

      <div>
        <h1 class="title mt-0 mb-1">Gestion des Séances</h1>
        <vex-breadcrumbs
          [crumbs]="['Configuration', 'Gestion des Séances']">
        </vex-breadcrumbs>
      </div>

      <mat-button-toggle-group
        [formControl]="layoutCtrl"
        class="sm:mt-0">
        <mat-button-toggle value="boxed">Réduit</mat-button-toggle>
        <mat-button-toggle value="fullwidth">Plein écran</mat-button-toggle>
      </mat-button-toggle-group>

    </div>
  </vex-page-layout-header>

  <!-- CONTENT -->
  <vex-page-layout-content
    [class.container]="layoutCtrl.value === 'boxed'"
    class="py-6">

    <div class="card overflow-hidden">

      <!-- TOOLBAR -->
      <div class="bg-app-bar px-6 h-16 border-b flex items-center sticky top-0 z-10">

        <h2 class="title my-0 hidden sm:block flex-none">
          Séances
        </h2>

        <mat-form-field subscriptSizing="dynamic" class="ml-4 flex-1 max-w-md">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input matInput [formControl]="searchCtrl" placeholder="Rechercher..." />
        </mat-form-field>

      </div>

      <!-- TABLE -->
      <div class="overflow-auto">
        <table
          @stagger
          [dataSource]="dataSource"
          class="w-full"
          mat-table
          matSort>

          <!-- DATE -->
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef class="table-header">
              Date
            </th>
            <td mat-cell *matCellDef="let row" class="table-cell">
              <div class="flex items-center gap-2">
                <mat-icon svgIcon="mat:calendar_today" class="text-slate-300 scale-75"></mat-icon>
                {{ row.date | date:'dd MMM yyyy' }}
              </div>
            </td>
          </ng-container>

          <!-- MATIERE -->
          <ng-container matColumnDef="matiere">
            <th mat-header-cell *matHeaderCellDef class="table-header">
              Matière
            </th>
            <td mat-cell *matCellDef="let row" class="table-cell">
              <span class="badge-indigo">
                {{ row.matiere }}
              </span>
            </td>
          </ng-container>

          <!-- DEBUT -->
          <ng-container matColumnDef="heureDebut">
            <th mat-header-cell *matHeaderCellDef class="table-header text-center">
              Début
            </th>
            <td mat-cell *matCellDef="let row" class="table-cell text-center font-mono">
              {{ row.heureDebut }}
            </td>
          </ng-container>

          <!-- FIN -->
          <ng-container matColumnDef="heureFin">
            <th mat-header-cell *matHeaderCellDef class="table-header text-center">
              Fin
            </th>
            <td mat-cell *matCellDef="let row" class="table-cell text-center font-mono">
              {{ row.heureFin }}
            </td>
          </ng-container>

          <!-- STATUT -->
          <ng-container matColumnDef="statut">
            <th mat-header-cell *matHeaderCellDef class="table-header text-right">
              Statut
            </th>
            <td mat-cell *matCellDef="let row" class="table-cell text-right">
              <span
                class="status-badge"
                [ngClass]="row.statut === 'Terminé'
                  ? 'status-success'
                  : 'status-warning'">
                {{ row.statut }}
              </span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns" class="bg-slate-50"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"
              class="hover:bg-indigo-50/30 transition cursor-pointer">
          </tr>

        </table>
      </div>

      <!-- PAGINATOR -->
      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        class="border-t">
      </mat-paginator>

    </div>
  </vex-page-layout-content>
</vex-page-layout>
