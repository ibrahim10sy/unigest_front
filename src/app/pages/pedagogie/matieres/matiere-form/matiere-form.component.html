<form (ngSubmit)="save()" [formGroup]="form">
  <div class="flex items-center" mat-dialog-title>
    <mat-icon class="mr-4" svgIcon="mat:layers" color="primary"></mat-icon>
    <h2 class="headline m-0 flex-auto">{{ mode === 'update' ? 'Modifier' : 'Nouveau' }} Matière</h2>
    <button mat-dialog-close class="text-secondary" mat-icon-button type="button">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <mat-divider class="text-border"></mat-divider>

  <mat-dialog-content class="flex flex-col mt-2">
    <mat-form-field class="flex-auto">
      <mat-label>Nom de la matière </mat-label>
      <input cdkFocusInitial formControlName="nom" matInput placeholder="Ex. Maths...">
      <!-- <mat-icon matIconPrefix svgIcon="mat:edit"></mat-icon> -->
    </mat-form-field>
    
     <!-- <mat-form-field class="w-full">
      <mat-label>Coèfficient de la matière</mat-label>
      <input matInput type="number" formControlName="coefficient">
    </mat-form-field> -->
  
  </mat-dialog-content>
 

  <mat-divider class="text-border"></mat-divider>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Annuler</button>
    <button color="primary" mat-flat-button type="submit" [disabled]="form.invalid">
      {{ mode === 'update' ? 'Mettre à jour' : 'Enregistrer' }}
    </button>
  </mat-dialog-actions>
</form>
