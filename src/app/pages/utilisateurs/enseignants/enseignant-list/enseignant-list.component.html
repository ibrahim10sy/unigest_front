<vex-page-layout>
  <vex-page-layout-header
    class="pb-16 flex flex-col items-start justify-center">
    <div
      [class.container]="layoutCtrl.value === 'boxed'"
      [class.px-6]="layoutCtrl.value === 'fullwidth'"
      class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <h1 class="title mt-0 mb-1">Gestion des Enseignants</h1>
        <vex-breadcrumbs
          [crumbs]="[
            'Configuration',
            'Gestion des Enseignants'
          ]"></vex-breadcrumbs>
      </div>

      <div class="hidden sm:block">
        <mat-button-toggle-group
          [formControl]="layoutCtrl"
          class="mt-4 sm:mt-0">
          <mat-button-toggle value="boxed">Réduire</mat-button-toggle>
          <mat-button-toggle value="fullwidth">Plein écran</mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
  </vex-page-layout-header>

  <vex-page-layout-content
    [class.container]="layoutCtrl.value === 'boxed'"
    class="-mt-6">
    <div class="card overflow-auto -mt-16">
      <div
        class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center">
        <h2 class="title my-0 hidden sm:block flex-none">Enseignants</h2>

        <mat-form-field subscriptSizing="dynamic" class="ml-4">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input
            matInput
            [formControl]="searchCtrl"
            placeholder="Rechercher un..."
            type="text" />
        </mat-form-field>

        <span class="flex-1"></span>

        <button
          (click)="ajouter()"
          class="ml-4 flex-none"
          color="primary"
          mat-mini-fab
          matTooltip="Ajouter un niveau">
          <mat-icon svgIcon="mat:add"></mat-icon>
        </button>
      </div>

      <table
        @stagger
        [dataSource]="dataSource"
        class="w-full"
        mat-table
        matSort>
        <ng-container matColumnDef="id">
          <th
            *matHeaderCellDef
            mat-header-cell
            mat-sort-header
            class="uppercase">
            ID
          </th>
          <td *matCellDef="let row" mat-cell>{{ row.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef>Nom complet</th>
          <td mat-cell *matCellDef="let row">
            <div class="flex flex-col">
              <span class="text-sm font-bold"
                >{{ row.nom }} {{ row.prenom }}</span
              >
              <span class="text-xs text-secondary">{{ row.adresse }}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="contact">
          <th *matHeaderCellDef mat-header-cell></th>
          <td *matCellDef="let row" mat-cell>
            <div class="flex">
              <!-- 📞 Téléphone -->
              <button
                *ngIf="row.telephone"
                (click)="$event.stopPropagation(); appeler(row.telephone)"
                class="w-8 h-8 p-0 leading-none flex items-center justify-center hover:bg-hover text-primary-600 bg-primary-600/10"
                mat-icon-button
                matTooltip="Appeler">
                <mat-icon class="icon-sm" svgIcon="mat:phone"></mat-icon>
              </button>

              <!-- 📧 Email -->
              <button
                *ngIf="row.email"
                (click)="$event.stopPropagation(); envoyerEmail(row.email)"
                class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-teal-600 bg-teal/10"
                mat-icon-button
                matTooltip="Envoyer un email">
                <mat-icon class="icon-sm" svgIcon="mat:mail"></mat-icon>
              </button>

              <!-- 📍 Adresse -->
              <button
                *ngIf="row.adresse"
                (click)="$event.stopPropagation(); ouvrirCarte(row.adresse)"
                class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-green-600 bg-green-600/10"
                mat-icon-button
                matTooltip="Voir localisation">
                <mat-icon class="icon-sm" svgIcon="mat:map"></mat-icon>
              </button>
            </div>
          </td>
        </ng-container>
        <ng-container matColumnDef="specialite">
          <th
            *matHeaderCellDef
            mat-header-cell
            mat-sort-header
            class="uppercase">
            Spécialité
          </th>
          <td *matCellDef="let row" mat-cell class="font-medium text-primary">
            {{ row.specialite }}
          </td>
        </ng-container>
        <ng-container matColumnDef="adresse">
          <th
            *matHeaderCellDef
            mat-header-cell
            mat-sort-header
            class="uppercase">
            Adresse
          </th>
          <td *matCellDef="let row" mat-cell class="font-medium text-primary">
            {{ row.adresse }}
          </td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th
            *matHeaderCellDef
            mat-header-cell
            mat-sort-header
            class="uppercase">
            Email
          </th>
          <td *matCellDef="let row" mat-cell class="font-medium text-primary">
            {{ row.email }}
          </td>
        </ng-container>
        <ng-container matColumnDef="telephone">
          <th
            *matHeaderCellDef
            mat-header-cell
            mat-sort-header
            class="uppercase">
            Téléphone
          </th>
          <td *matCellDef="let row" mat-cell class="font-medium text-primary">
            {{ row.telephone }}
          </td>
        </ng-container>

        <ng-container matColumnDef="cv">
          <th mat-header-cell *matHeaderCellDef>CV</th>

          <td mat-cell *matCellDef="let row">
            <div class="flex items-center gap-2">
              <!-- Voir CV -->
              <ng-container *ngIf="hasCv(row.id); else noCv">
                <button
                  mat-icon-button
                  matTooltip="Voir CV"
                  (click)="$event.stopPropagation(); voirCv(cvMap[row.id][0])">
                  <mat-icon svgIcon="mat:visibility"></mat-icon>
                </button>
              </ng-container>

              <!-- Aucun CV -->
              <ng-template #noCv>
                <span class="text-xs text-gray-400">Aucun CV</span>
              </ng-template>

              <!-- Upload CV -->
              <button
                mat-icon-button
                matTooltip="Uploader CV"
                (click)="fileInput.click()">
                <mat-icon svgIcon="mat:upload"></mat-icon>
              </button>

              <!-- input file -->
              <input
                #fileInput
                type="file"
                hidden
                accept=".pdf,.jpg,.jpeg,.png"
                (change)="onFileSelected($event, row)" />
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th *matHeaderCellDef mat-header-cell></th>
          <td *matCellDef="let row" class="w-10 text-secondary" mat-cell>
            <div class="flex">
              <button mat-icon-button (click)="ouvrirDetail(row)">
                <mat-icon svgIcon="mat:visibility"></mat-icon>
              </button>
              <button
                (click)="$event.stopPropagation(); modifier(row)"
                mat-icon-button
                color="primary">
                <mat-icon svgIcon="mat:edit"></mat-icon>
              </button>
              <button
                (click)="$event.stopPropagation(); supprimer(row)"
                mat-icon-button
                color="warn">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
        <tr
          *matRowDef="let row; columns: displayedColumns"
          @fadeInUp
          class="hover:bg-hover cursor-pointer"
          mat-row></tr>
      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>
</vex-page-layout>
