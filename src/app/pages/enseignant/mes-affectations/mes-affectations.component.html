<vex-page-layout>

  <vex-page-layout-header class="pb-16 flex flex-col items-start justify-center">
    <div class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <h1 class="title mt-0 mb-1">Mes Affectations</h1>
        <vex-breadcrumbs [crumbs]="['Mon Espace', 'Mes Affectations']"></vex-breadcrumbs>
      </div>
      <div class="flex items-center mt-4 sm:mt-0">
        <span class="text-secondary text-sm">
          Connecté en tant que&nbsp;<strong>{{ enseignantNom }}</strong>
        </span>
      </div>
    </div>
  </vex-page-layout-header>

  <vex-page-layout-content class="-mt-6">
    <div class="card overflow-auto -mt-16">

      <!-- Barre de recherche -->
      <div class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center gap-4">
        <h2 class="title my-0 hidden sm:block flex-none">Mes Affectations</h2>
        <mat-form-field subscriptSizing="dynamic" class="ml-4">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input matInput [formControl]="searchCtrl" placeholder="Rechercher une classe…" type="text" />
        </mat-form-field>
      </div>

      <!-- Table -->
      <table @stagger [dataSource]="dataSource" class="w-full" mat-table matSort>

        <!-- Classe -->
        <ng-container matColumnDef="classe">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Classe</th>
          <td mat-cell *matCellDef="let row">
            <span class="font-semibold text-primary">{{ row.classe?.nom }}</span>
          </td>
        </ng-container>

        <!-- Matières -->
        <ng-container matColumnDef="matieres">
          <th mat-header-cell *matHeaderCellDef>Matières enseignées</th>
          <td mat-cell *matCellDef="let row">
            <div class="flex flex-wrap gap-1 py-1">
              <span *ngFor="let m of row.matieres"
                class="bg-indigo-100 text-indigo-700 text-xs font-medium px-2 py-0.5 rounded-full">
                {{ m.nom }}
              </span>
            </div>
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row" class="w-32">
            <button
              mat-raised-button
              color="primary"
              (click)="voirDetails(row); $event.stopPropagation()"
              matTooltip="Voir séances, appels et notes">
              <mat-icon svgIcon="mat:open_in_new"></mat-icon>
              Gérer
            </button>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
        <tr *matRowDef="let row; columns: displayedColumns"
            @fadeInUp
            class="hover:bg-hover cursor-pointer"
            mat-row
            (click)="voirDetails(row)">
        </tr>

      </table>

      <!-- Message vide -->
      <div *ngIf="dataSource.data.length === 0" class="flex flex-col items-center justify-center py-12 text-secondary">
        <mat-icon svgIcon="mat:assignment" class="text-5xl mb-3 opacity-30"></mat-icon>
        <p>Aucune affectation pour le moment.</p>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 20]" class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>

</vex-page-layout>
