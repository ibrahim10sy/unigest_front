<div class="p-6">
  <div class="flex flex-row justify-between items-center mb-4">
    <h2 class="title m-0">Gestion des Filières</h2>
    <button color="primary" (click)="ajouter()" mat-raised-button type="button">
      <!-- <mat-icon class="mr-2">add</mat-icon> -->
      Ajouter
    </button>
  </div>

  <mat-form-field appearance="fill" class="w-full">
    <mat-label>Rechercher une filière...</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Génie Logiciel" #input>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="mat-elevation-z8 overflow-hidden rounded-lg">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let row"> {{row.id}} </td>
      </ng-container>

      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nom de la Filière </th>
        <td mat-cell *matCellDef="let row"> {{row.nom}} </td>
      </ng-container>

      <ng-container matColumnDef="actif">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Statut </th>
        <td mat-cell *matCellDef="let row">
          <span [class]="row.actif ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'" 
                class="px-2 py-1 rounded text-xs font-medium">
            {{ row.actif ? 'ACTIF' : 'INACTIF' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let row">
          <!-- SWITCH ACTIVER / DESACTIVER -->
<mat-slide-toggle
  [checked]="row.actif"
  [disabled]="row.loading"
  (click)="$event.stopPropagation(); onToggleClick($event, row)"
  color="primary">
  {{ row.actif ? 'Active' : 'Inactive' }}
</mat-slide-toggle>

    <!-- EDIT -->
    <button mat-icon-button color="primary" (click)="modifier(row)">
      <mat-icon svgIcon="mat:edit"></mat-icon>
    </button>

    <!-- DELETE -->
    <button mat-icon-button color="warn" (click)="supprimer(row)">
      <mat-icon svgIcon="mat:delete"></mat-icon>
    </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell p-4" colspan="4">Aucune donnée correspondant à "{{input.value}}"</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Sélectionner la page"></mat-paginator>
  </div>
</div>
