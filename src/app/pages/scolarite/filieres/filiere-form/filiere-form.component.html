<form [formGroup]="form" (ngSubmit)="save()">
  <h2 mat-dialog-title>
    {{ isEditMode ? 'Modifier la filière' : 'Nouvelle filière' }}
  </h2>

  <mat-dialog-content class="flex flex-col gap-4 mt-4">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nom de la filière</mat-label>
      <input matInput formControlName="nom" placeholder="Ex. Génie Logiciel">
      <mat-error *ngIf="form.get('nom')?.hasError('required')">Le nom est obligatoire</mat-error>
    </mat-form-field>

    <div class="py-2" *ngIf="isEditMode">
      <mat-slide-toggle formControlName="actif" color="primary">
        Filière active
      </mat-slide-toggle>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="p-4 border-t">
    <button mat-button type="button" (click)="close()">Annuler</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      {{ isEditMode ? 'Mettre à jour' : 'Enregistrer' }}
    </button>
  </mat-dialog-actions>
</form>
