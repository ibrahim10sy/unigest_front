<form [formGroup]="form" (ngSubmit)="save()">
  <h2 mat-dialog-title>{{ mode === 'update' ? 'Modifier' : 'Nouvel' }} Étudiant</h2>

  <mat-dialog-content class="flex flex-col gap-4">
    <!-- <mat-form-field class="w-full">
      <mat-label>Matricule</mat-label>
      <input matInput formControlName="matricule">
    </mat-form-field> -->

    <div class="flex gap-4">
      <mat-form-field class="flex-auto">
        <mat-label>Prénom</mat-label>
        <input matInput formControlName="prenom">
      </mat-form-field>
      <mat-form-field class="flex-auto">
        <mat-label>Nom</mat-label>
        <input matInput formControlName="nom">
      </mat-form-field>
    </div>

    <div class="flex gap-4">
      <mat-form-field class="flex-auto">
         <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email">
      </mat-form-field>
      <mat-form-field class="flex-auto">
        <mat-label>Téléphone</mat-label>
      <input matInput formControlName="telephone">
      <mat-icon matIconPrefix svgIcon="mat:phone"></mat-icon>
      </mat-form-field>
    </div>

  
  <mat-form-field class="flex-auto">
        <mat-label>Date de Naissance</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="dateNaissance">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    <mat-form-field class="w-full">
      <mat-label>Parent / Tuteur</mat-label>
      <mat-select formControlName="parent" [compareWith]="compareParents">
        <mat-option *ngFor="let p of parents" [value]="p">
          {{ p.prenom }} {{ p.nom }} ({{ p.telephone }})
        </mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Annuler</button>
    <button mat-flat-button color="primary" [disabled]="form.invalid">Enregistrer</button>
  </mat-dialog-actions>
</form>
