<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h1 class="title m-0">Liste des Étudiants</h1>
    <button (click)="ajouter()" mat-flat-button color="primary">
      <mat-icon class="mr-2" svgIcon="mat:person_add"></mat-icon> Ajouter un étudiant
    </button>
  </div>

  <div class="card overflow-auto">
    <table [dataSource]="dataSource" mat-table class="w-full">
      <ng-container matColumnDef="matricule">
        <th mat-header-cell *matHeaderCellDef>Matricule</th>
        <td mat-cell *matCellDef="let row" class="font-medium">{{ row.matricule }}</td>
      </ng-container>

      <ng-container matColumnDef="nomComplet">
        <th mat-header-cell *matHeaderCellDef>Étudiant</th>
        <td mat-cell *matCellDef="let row">{{ row.prenom }} {{ row.nom }}</td>
      </ng-container>

      <ng-container matColumnDef="parent">
        <th mat-header-cell *matHeaderCellDef>Parent</th>
        <td mat-cell *matCellDef="let row">
          <div class="flex flex-col" *ngIf="row.parent">
            <span class="text-sm font-bold">{{ row.parent.prenom }} {{ row.parent.nom }}</span>
            <span class="text-xs text-secondary">{{ row.parent.telephone }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button (click)="modifier(row)" mat-icon-button color="primary"><mat-icon svgIcon="mat:edit"></mat-icon></button>
          <button (click)="supprimer(row.id)" mat-icon-button color="warn"><mat-icon svgIcon="mat:delete"></mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="10"></mat-paginator>
  </div>
</div>
