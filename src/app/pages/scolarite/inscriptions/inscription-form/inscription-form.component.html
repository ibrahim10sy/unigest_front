<form [formGroup]="form" (ngSubmit)="save()">
  <h2 mat-dialog-title>{{ mode === 'update' ? 'Réaffectation' : 'Nouvelle Inscription' }}</h2>

  <mat-dialog-content class="flex flex-col gap-4">
    <mat-form-field class="w-full">
      <mat-label>Étudiant</mat-label>
      <mat-select formControlName="etudiantId">
        <mat-option *ngFor="let e of etudiants" [value]="e.id">
          {{ e.matricule }} - {{ e.prenom }} {{ e.nom }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="w-full">
      <mat-label>Classe</mat-label>
      <mat-select formControlName="classeId">
        <mat-option *ngFor="let c of classes" [value]="c.id">{{ c.nom }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="w-full">
      <mat-label>Année Scolaire</mat-label>
      <mat-select formControlName="anneeId">
        <mat-option *ngFor="let a of annees" [value]="a.id" [disabled]="!a.active">
          {{ a.libelle }} {{ a.active ? '(Courante)' : '' }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="w-full">
      <mat-label>Montant des frais</mat-label>
      <input matInput type="number" formControlName="montantTotal">
      <span matTextSuffix>FCFA</span>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Annuler</button>
    <button mat-flat-button color="primary" [disabled]="form.invalid">Valider l'inscription</button>
  </mat-dialog-actions>
</form>
