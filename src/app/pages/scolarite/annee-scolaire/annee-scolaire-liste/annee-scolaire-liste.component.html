<vex-page-layout>
  <vex-page-layout-header class="pb-16 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'"
         [class.px-6]="layoutCtrl.value === 'fullwidth'"
         class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <h1 class="title mt-0 mb-1">Années Scolaires</h1>
        <vex-breadcrumbs [crumbs]="['Configuration', 'Années Scolaires']"></vex-breadcrumbs>
      </div>
    </div>
  </vex-page-layout-header>

  <vex-page-layout-content [class.container]="layoutCtrl.value === 'boxed'" class="-mt-6">
    <div class="card overflow-auto -mt-16">

      <!-- Barre d'outils -->
      <div class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center gap-4">
        <mat-form-field subscriptSizing="dynamic" class="flex-1 max-w-xs">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input matInput [formControl]="searchCtrl" placeholder="Rechercher..." type="text"/>
        </mat-form-field>

        <span class="flex-1"></span>

        <button (click)="ajouter()" color="primary" mat-flat-button type="button">
          <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
          Ajouter
        </button>
      </div>

      <!-- Table -->
      <table @stagger [dataSource]="dataSource" class="w-full" mat-table matSort>

        <ng-container matColumnDef="libelle">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Libellé</th>
          <td *matCellDef="let row" mat-cell class="font-semibold text-slate-800">{{ row.libelle }}</td>
        </ng-container>

        <ng-container matColumnDef="dateDebut">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Début</th>
          <td *matCellDef="let row" mat-cell class="text-slate-500 text-sm">
            {{ row.dateDebut | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="dateFin">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Fin</th>
          <td *matCellDef="let row" mat-cell class="text-slate-500 text-sm">
            {{ row.dateFin | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="statut">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Statut</th>
          <td *matCellDef="let row" mat-cell>
            <div class="flex items-center gap-2">
              <mat-slide-toggle [checked]="row.active" [disabled]="row.loading"
                                (change)="onToggleChange($event, row)"
                                (click)="$event.stopPropagation()"
                                color="primary"></mat-slide-toggle>
              <span [class]="row.active ? 'badge-actif' : 'badge-inactif'">
                {{ row.active ? 'ACTIF' : 'INACTIF' }}
              </span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th *matHeaderCellDef mat-header-cell></th>
          <td *matCellDef="let row" class="w-10 text-secondary" mat-cell>
            <div class="flex">
              <button (click)="$event.stopPropagation(); modifier(row)" mat-icon-button matTooltip="Modifier">
                <mat-icon svgIcon="mat:edit" class="text-indigo-400"></mat-icon>
              </button>
              <button (click)="$event.stopPropagation(); supprimer(row)" mat-icon-button matTooltip="Supprimer">
                <mat-icon svgIcon="mat:delete" class="text-red-400"></mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
        <tr *matRowDef="let row; columns: displayedColumns"
            @fadeInUp class="hover:bg-hover cursor-pointer" mat-row></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 20, 50]" class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>
</vex-page-layout>
