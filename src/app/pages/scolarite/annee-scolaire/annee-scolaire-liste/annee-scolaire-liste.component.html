<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h1 class="title m-0">Années Scolaires</h1>
    <button (click)="ajouter()" mat-flat-button color="primary">
      <mat-icon class="mr-2" svgIcon="mat:add"></mat-icon> Ajouter
    </button>
  </div>

  <div class="card overflow-auto">
    <table [dataSource]="dataSource" mat-table class="w-full">
      <ng-container matColumnDef="libelle">
        <th mat-header-cell *matHeaderCellDef>Libellé</th>
        <td mat-cell *matCellDef="let row" class="font-bold">{{ row.libelle }}</td>
      </ng-container>

      <ng-container matColumnDef="dateDebut">
        <th mat-header-cell *matHeaderCellDef>Début</th>
        <td mat-cell *matCellDef="let row">{{ row.dateDebut | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="dateFin">
        <th mat-header-cell *matHeaderCellDef>Fin</th>
        <td mat-cell *matCellDef="let row">{{ row.dateFin | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="statut">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let row">
          <span *ngIf="row.active" class="bg-green-600/10 text-green-600 px-2 py-1 rounded text-xs font-bold">ACTIF</span>
          <span *ngIf="!row.active" class="bg-gray-600/10 text-gray-600 px-2 py-1 rounded text-xs font-bold">INACTIF</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="w-10">
          <div class="flex">
            <button (click)="modifier(row)" mat-icon-button color="primary"><mat-icon svgIcon="mat:edit"></mat-icon></button>
            <button (click)="supprimer(row.id)" mat-icon-button color="warn"><mat-icon svgIcon="mat:delete"></mat-icon></button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="10"></mat-paginator>
  </div>
</div>
