<vex-page-layout>
  <vex-page-layout-header class="pb-16 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'"
         class="w-full flex flex-col sm:flex-row justify-between px-6">
      <div>
        <h1 class="title mt-0 mb-1">Gestion des Classes</h1>
        <vex-breadcrumbs [crumbs]="['Scolarité', 'Classes']"></vex-breadcrumbs>
      </div>
      <div class="hidden sm:flex items-center gap-3">
        <div class="bg-white/20 backdrop-blur-sm rounded-xl px-4 py-2 text-white text-sm font-medium">
          {{ dataSource.data.length }} classe{{ dataSource.data.length !== 1 ? 's' : '' }}
        </div>
      </div>
    </div>
  </vex-page-layout-header>

  <vex-page-layout-content [class.container]="layoutCtrl.value === 'boxed'" class="-mt-6">
    <div class="card overflow-auto -mt-16">

      <!-- Barre d'outils -->
      <div class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center gap-4">
        <mat-form-field subscriptSizing="dynamic" class="flex-1 max-w-xs">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input matInput [formControl]="searchCtrl" placeholder="Rechercher une classe..." type="text"/>
        </mat-form-field>

        <span class="flex-1"></span>

        <button *ngIf="isAdmin" (click)="ajouter()" color="primary" mat-flat-button type="button">
          <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
          Ajouter
        </button>
      </div>

      <!-- Table -->
      <table @stagger [dataSource]="dataSource" class="w-full" mat-table matSort>

        <ng-container matColumnDef="checkbox">
          <th *matHeaderCellDef mat-header-cell>
            <mat-checkbox (change)="$event ? masterToggle() : null"
                          [checked]="selection.hasValue() && isAllSelected()"
                          [indeterminate]="selection.hasValue() && !isAllSelected()"
                          color="primary"></mat-checkbox>
          </th>
          <td *matCellDef="let row" class="w-4" mat-cell>
            <mat-checkbox (change)="$event ? selection.toggle(row) : null"
                          (click)="$event.stopPropagation()"
                          [checked]="selection.isSelected(row)"
                          color="primary"></mat-checkbox>
          </td>
        </ng-container>

        <ng-container matColumnDef="nom">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Nom</th>
          <td *matCellDef="let row" mat-cell class="font-semibold text-slate-800">{{ row.nom }}</td>
        </ng-container>

        <ng-container matColumnDef="niveau">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Niveau</th>
          <td *matCellDef="let row" mat-cell>
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold" style="background:#e0e7ff;color:#4f46e5;">
              {{ row.filiere?.niveau?.nom }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="filiere">
          <th *matHeaderCellDef mat-header-cell mat-sort-header>Filière</th>
          <td *matCellDef="let row" mat-cell class="text-slate-500">{{ row.filiere?.nom }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th *matHeaderCellDef mat-header-cell></th>
          <td *matCellDef="let row" class="w-10 text-secondary" mat-cell>
            <div class="flex">
              <button mat-icon-button (click)="details(row); $event.stopPropagation()" matTooltip="Détails">
                <mat-icon svgIcon="mat:visibility" class="text-slate-400"></mat-icon>
              </button>
              <ng-container *ngIf="isAdmin">
                <button (click)="$event.stopPropagation(); modifier(row)" mat-icon-button matTooltip="Modifier">
                  <mat-icon svgIcon="mat:edit" class="text-indigo-400"></mat-icon>
                </button>
                <button (click)="$event.stopPropagation(); supprimer(row)" mat-icon-button matTooltip="Supprimer">
                  <mat-icon svgIcon="mat:delete" class="text-red-400"></mat-icon>
                </button>
              </ng-container>
            </div>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
        <tr *matRowDef="let row; columns: displayedColumns"
            @fadeInUp (click)="isAdmin && modifier(row)"
            class="hover:bg-hover cursor-pointer" mat-row></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 20, 50]" class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>
</vex-page-layout>
