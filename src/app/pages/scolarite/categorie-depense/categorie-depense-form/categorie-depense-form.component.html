<form (ngSubmit)="save()" [formGroup]="form">
  <div class="flex items-center" mat-dialog-title>
    <mat-icon class="mr-4" svgIcon="mat:category" color="primary"></mat-icon>
    <h2 class="headline m-0 flex-auto">{{ mode === 'update' ? 'Modifier' : 'Nouvelle' }}  Dépense</h2>
    <button mat-dialog-close class="text-secondary" mat-icon-button type="button">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <mat-divider class="text-border"></mat-divider>

  <mat-dialog-content class="flex flex-col mt-4">
    <mat-form-field class="flex-auto">
      <mat-label>Nom </mat-label>
      <input cdkFocusInitial formControlName="nom" matInput placeholder="Ex: Loyer, Alimentation...">
      <mat-icon matIconPrefix svgIcon="mat:edit"></mat-icon>
    </mat-form-field>

    <mat-form-field class="flex-auto">
      <mat-label>Description</mat-label>
      <input cdkFocusInitial formControlName="description" matInput placeholder="Ex: Description/Motif...">
      <!-- <mat-icon matIconPrefix svgIcon="mat:edit"></mat-icon> -->
    </mat-form-field>

  </mat-dialog-content>

  <mat-divider class="text-border"></mat-divider>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Annuler</button>
    <button color="primary" mat-flat-button type="submit" [disabled]="form.invalid">
      {{ mode === 'update' ? 'Mettre à jour' : 'Enregistrer' }}
    </button>
  </mat-dialog-actions>
</form>
