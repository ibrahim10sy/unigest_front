<div class="w-full min-h-screen flex items-center justify-center p-4"
     style="background:linear-gradient(135deg,#312e81 0%,#4f46e5 50%,#7c3aed 100%);">

  <!-- Motif de fond décoratif -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 rounded-full opacity-10"
         style="background:radial-gradient(circle,#fff,transparent)"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full opacity-10"
         style="background:radial-gradient(circle,#fff,transparent)"></div>
  </div>

  <div class="relative w-full max-w-md bg-white shadow-2xl rounded-2xl overflow-hidden">

    <!-- En-tête avec gradient -->
    <div class="px-8 pt-10 pb-6 text-center" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);">
      <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center"
           style="background:rgba(255,255,255,0.2);">
        <mat-icon svgIcon="mat:school" style="font-size:32px;width:32px;height:32px;color:white;"></mat-icon>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight mb-1">UniGest</h1>
      <p class="text-indigo-200 text-sm font-medium tracking-widest uppercase">Gestion Scolaire</p>
    </div>

    <!-- Formulaire -->
    <div class="px-8 py-8">
      <p class="text-slate-500 text-center text-sm mb-6">Connectez-vous à votre espace</p>

      <form [formGroup]="form" class="flex flex-col gap-5">

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email ou téléphone</mat-label>
          <input formControlName="login" matInput required placeholder="exemple@domaine.com"/>
          <mat-icon matSuffix svgIcon="mat:mail" class="text-slate-400"></mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Mot de passe</mat-label>
          <input [type]="inputType" formControlName="password" matInput required/>
          <button (click)="toggleVisibility()" mat-icon-button matSuffix type="button">
            <mat-icon *ngIf="visible" svgIcon="mat:visibility" class="text-slate-400"></mat-icon>
            <mat-icon *ngIf="!visible" svgIcon="mat:visibility_off" class="text-slate-400"></mat-icon>
          </button>
        </mat-form-field>

        <div class="flex items-center justify-between -mt-2">
          <mat-checkbox color="primary" class="text-sm text-slate-600">Se souvenir de moi</mat-checkbox>
          <a [routerLink]="['/forgot-password']"
             class="text-indigo-600 hover:text-indigo-800 font-semibold text-sm transition-colors">
            Mot de passe oublié ?
          </a>
        </div>

        <button (click)="send()" [disabled]="loading" color="primary" mat-flat-button
                class="h-12 text-base font-bold" type="submit"
                style="border-radius:10px;">
          <span *ngIf="!loading">SE CONNECTER</span>
          <mat-spinner *ngIf="loading" diameter="22" color="accent"></mat-spinner>
        </button>

      </form>
    </div>

  </div>
</div>
