<div
  [class.container]="isVerticalLayout$ | async"
  class="toolbar text-default w-full px-6 flex items-center">

  <!-- Burger menu mobile -->
  <button
    (click)="openSidenav()"
    [class.hidden]="isDesktop$ | async"
    mat-icon-button
    type="button">
    <mat-icon svgIcon="mat:menu"></mat-icon>
  </button>

  <!-- Logo mobile -->
  <a
    *ngIf="isVerticalLayout$ | async"
    [routerLink]="['/']"
    class="ltr:mr-4 rtl:ml-4 flex items-center gap-2">
    <div class="w-7 h-7 rounded-md bg-indigo-600 flex items-center justify-center">
      <mat-icon svgIcon="mat:school" style="font-size:16px;width:16px;height:16px;color:white;"></mat-icon>
    </div>
    <span
      [class.hidden]="isDesktop$ | async"
      class="text-lg font-bold text-slate-800 select-none">
      UniGest
    </span>
  </a>

  <span class="flex-1"></span>

  <!-- Actions toolbar -->
  <div class="-mx-1 flex items-center gap-1">

    <!-- Recherche -->
    <button (click)="openSearch()" mat-icon-button type="button" matTooltip="Rechercher">
      <mat-icon svgIcon="mat:search" class="text-slate-500"></mat-icon>
    </button>

    <!-- Notifications -->
    <vex-toolbar-notifications></vex-toolbar-notifications>

    <!-- Séparateur -->
    <div class="w-px h-6 bg-slate-200 mx-2"></div>

    <!-- Profil utilisateur -->
    <div *ngIf="userVisible$ | async" class="px-1">
      <vex-toolbar-user></vex-toolbar-user>
    </div>
  </div>
</div>

<vex-navigation
  *ngIf="(isVerticalLayout$ | async) && (isNavbarBelowToolbar$ | async)"
  [class.hidden]="!(isDesktop$ | async)"></vex-navigation>
